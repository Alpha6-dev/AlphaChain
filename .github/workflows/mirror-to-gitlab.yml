name: Mirror to GitLab

on:
  push:
    branches: ['**']
    tags: ['**']
  delete:
  workflow_dispatch:

concurrency:
  group: mirror-to-gitlab
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push branches and tags to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          git push --force             "https://oauth2:${GITLAB_TOKEN}@gitlab.com/alpha6-dev-group/AlphaChain.git"             'refs/heads/*:refs/heads/*'             'refs/tags/*:refs/tags/*'             --prune
