name: Mirror to GitLab

on:
  push:
    branches: ['**']
    tags: ['**']
  delete:

concurrency:
  group: mirror-to-gitlab
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to GitLab
        env:
          GL_USER: oauth2
          GL_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          git push --mirror "https://${GL_USER}:${GL_TOKEN}@gitlab.com/alpha6-dev-group/AlphaChain.git"
