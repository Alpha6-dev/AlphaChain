name: Mirror to GitLab

on:
  push:
    branches: ['**']
    tags: ['**']
  delete:
  workflow_dispatch:

concurrency:
  group: mirror-to-gitlab
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          umask 077
          printf 'machine gitlab.com\nlogin oauth2\npassword %s\n' "${GITLAB_TOKEN}" > "${HOME}/.netrc"
          git push --mirror https://gitlab.com/alpha6-dev-group/AlphaChain.git
          rm -f "${HOME}/.netrc"
