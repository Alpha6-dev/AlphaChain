include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

stages:
  - build
  - test
  - security
  - docker
  - deploy

variables:
  NODE_IMAGE: node:20-alpine

# ── Build ────────────────────────────────────────────────
build:
  stage: build
  image: $NODE_IMAGE
  script:
    - cd api
    - npm install
  cache:
    key: ${CI_COMMIT_REF_SLUG}-api
    paths:
      - api/node_modules/
  artifacts:
    paths:
      - api/node_modules/
    expire_in: 1 hour

# ── Test (Jest) ──────────────────────────────────────────
test:
  stage: test
  image: $NODE_IMAGE
  needs: [build]
  script:
    - cd api
    - npm test
  cache:
    key: ${CI_COMMIT_REF_SLUG}-api
    paths:
      - api/node_modules/
    policy: pull

# ── Docker ───────────────────────────────────────────────
docker:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
  script:
    - docker build -t $CI_REGISTRY_IMAGE/api:latest -t $CI_REGISTRY_IMAGE/api:$CI_COMMIT_SHORT_SHA -f api/Dockerfile api/
    - docker push $CI_REGISTRY_IMAGE/api:latest
    - docker push $CI_REGISTRY_IMAGE/api:$CI_COMMIT_SHORT_SHA
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ── Deploy ───────────────────────────────────────────────
staging:
  stage: deploy
  image: alpine:latest
  environment:
    name: staging
    url: https://staging-api.alpha6.io
  script:
    - echo "Deploying AlphaChain API $CI_COMMIT_SHORT_SHA to staging..."
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true

production:
  stage: deploy
  image: alpine:latest
  environment:
    name: production
    url: https://api.alpha6.io
  script:
    - echo "Deploying AlphaChain API $CI_COMMIT_SHORT_SHA to production..."
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true