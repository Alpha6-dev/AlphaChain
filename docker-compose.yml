services:
  api:
    build: ./api
    container_name: alphachain-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - LOG_LEVEL=info
      - WHATSAPP_VERIFY_TOKEN=alphachain-verify-token
    volumes:
      - invoice-data:/app/data
      - invoice-uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build: ./dashboard
    container_name: alphachain-dashboard
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  invoice-data:
  invoice-uploads:
