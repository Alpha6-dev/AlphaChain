version: '3.7'

volumes:
  orderer.alphachain.com:
  peer0.alpha.alphachain.com:
  peer0.customs.alphachain.com:

networks:
  alphachain:
    name: alphachain_network

services:
  # --- Orderer ---
  orderer.alphachain.com:
    container_name: orderer.alphachain.com
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=${FABRIC_LOGGING_SPEC:-INFO}
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
    working_dir: /root
    command: orderer
    volumes:
      - ../channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ../crypto-config/ordererOrganizations/alphachain.com/orderers/orderer.alphachain.com/msp:/var/hyperledger/orderer/msp
      - ../crypto-config/ordererOrganizations/alphachain.com/orderers/orderer.alphachain.com/tls:/var/hyperledger/orderer/tls
      - orderer.alphachain.com:/var/hyperledger/production/orderer
    ports:
      - "7050:7050"
      - "7053:7053"
    networks:
      - alphachain

  # --- AlphaOrg Peer ---
  peer0.alpha.alphachain.com:
    container_name: peer0.alpha.alphachain.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=${FABRIC_LOGGING_SPEC:-INFO}
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=alphachain_network
      - CORE_PEER_ID=peer0.alpha.alphachain.com
      - CORE_PEER_ADDRESS=peer0.alpha.alphachain.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.alpha.alphachain.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.alpha.alphachain.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.alpha.alphachain.com:7051
      - CORE_PEER_LOCALMSPID=AlphaOrgMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.alpha:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=${COUCHDB_USER:-admin}
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASSWORD:-adminpw}
    working_dir: /root
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../crypto-config/peerOrganizations/alpha.alphachain.com/peers/peer0.alpha.alphachain.com/msp:/etc/hyperledger/fabric/msp
      - ../crypto-config/peerOrganizations/alpha.alphachain.com/peers/peer0.alpha.alphachain.com/tls:/etc/hyperledger/fabric/tls
      - peer0.alpha.alphachain.com:/var/hyperledger/production
    ports:
      - "7051:7051"
    depends_on:
      - orderer.alphachain.com
      - couchdb.alpha
    networks:
      - alphachain

  # --- CustomsOrg Peer ---
  peer0.customs.alphachain.com:
    container_name: peer0.customs.alphachain.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=${FABRIC_LOGGING_SPEC:-INFO}
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=alphachain_network
      - CORE_PEER_ID=peer0.customs.alphachain.com
      - CORE_PEER_ADDRESS=peer0.customs.alphachain.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.customs.alphachain.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.customs.alphachain.com:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.customs.alphachain.com:9051
      - CORE_PEER_LOCALMSPID=CustomsOrgMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.customs:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=${COUCHDB_USER:-admin}
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASSWORD:-adminpw}
    working_dir: /root
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../crypto-config/peerOrganizations/customs.alphachain.com/peers/peer0.customs.alphachain.com/msp:/etc/hyperledger/fabric/msp
      - ../crypto-config/peerOrganizations/customs.alphachain.com/peers/peer0.customs.alphachain.com/tls:/etc/hyperledger/fabric/tls
      - peer0.customs.alphachain.com:/var/hyperledger/production
    ports:
      - "9051:9051"
    depends_on:
      - orderer.alphachain.com
      - couchdb.customs
    networks:
      - alphachain

  # --- CouchDB for AlphaOrg ---
  couchdb.alpha:
    container_name: couchdb.alpha
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=${COUCHDB_USER:-admin}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-adminpw}
    ports:
      - "5984:5984"
    networks:
      - alphachain

  # --- CouchDB for CustomsOrg ---
  couchdb.customs:
    container_name: couchdb.customs
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=${COUCHDB_USER:-admin}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-adminpw}
    ports:
      - "7984:5984"
    networks:
      - alphachain

  # --- Fabric CLI Tools ---
  cli:
    container_name: alphachain-cli
    image: hyperledger/fabric-tools:2.5
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - FABRIC_LOGGING_SPEC=${FABRIC_LOGGING_SPEC:-INFO}
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.alpha.alphachain.com:7051
      - CORE_PEER_LOCALMSPID=AlphaOrgMSP
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/alpha.alphachain.com/users/Admin@alpha.alphachain.com/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/alpha.alphachain.com/peers/peer0.alpha.alphachain.com/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/alpha.alphachain.com/peers/peer0.alpha.alphachain.com/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/alpha.alphachain.com/peers/peer0.alpha.alphachain.com/tls/ca.crt
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../../chaincode:/opt/gopath/src/github.com/hyperledger/fabric-samples/chaincode
      - ../crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto
      - ../channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
      - ../scripts:/opt/gopath/src/github.com/hyperledger/fabric/peer/scripts
    depends_on:
      - peer0.alpha.alphachain.com
      - peer0.customs.alphachain.com
    networks:
      - alphachain

  # --- PostgreSQL (off-chain metadata) ---
  postgres:
    container_name: alphachain-postgres
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-alphachain}
      - POSTGRES_USER=${POSTGRES_USER:-alphachain}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-alphachain_secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - alphachain

volumes:
  pgdata:
