# Cloud Build config for AlphaChain API
# Triggers on push to main via GitLab webhook or GitHub mirror
# Builds Docker image, pushes to Artifact Registry, deploys to Cloud Run

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: alphachain-api
  _CLOUD_SQL_INSTANCE: ''  # Set via trigger substitution

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/alpha6/${_SERVICE_NAME}:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/alpha6/${_SERVICE_NAME}:latest'
      - '-f'
      - 'api/Dockerfile'
      - 'api/'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/alpha6/${_SERVICE_NAME}'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/alpha6/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--port'
      - '3001'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--set-env-vars'
      - 'NODE_ENV=production,PORT=3001,POSTGRES_PORT=5432,POSTGRES_DB=alphachain,JWT_EXPIRES_IN=24h,FABRIC_CHANNEL_NAME=alphachannel,FABRIC_CHAINCODE_NAME=alphachain-shipment'
      - '--set-secrets'
      - 'POSTGRES_PASSWORD=POSTGRES_PASSWORD:latest,JWT_SECRET=JWT_SECRET:latest,POSTGRES_USER=POSTGRES_USER:latest,POSTGRES_HOST=POSTGRES_HOST:latest'
      - '--allow-unauthenticated'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/alpha6/${_SERVICE_NAME}:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/alpha6/${_SERVICE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
